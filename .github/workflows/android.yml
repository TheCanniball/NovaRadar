name: Release Pipeline

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      create_release:
        description: 'Build APKs and create GitHub Release'
        required: true
        default: true
        type: boolean

  push:
    tags:
      - 'v*'

jobs:
  version:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bumped.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read & bump version
        id: bumped
        run: |
          VERSION=$(grep -oP 'appVersionName\s*=\s*"\K[^"]+' "app/build.gradle.kts")
          echo "Current: $VERSION"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          TYPE="${{ github.event.inputs.version_type }}"
          if [ "$TYPE" = "major" ]; then MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0; fi
          if [ "$TYPE" = "minor" ]; then MINOR=$((MINOR+1)); PATCH=0; fi
          if [ "$TYPE" = "patch" ]; then PATCH=$((PATCH+1)); fi
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW" >> $GITHUB_OUTPUT

      - name: Update files
        run: |
          sed -i "s/appVersionName = \".*\"/appVersionName = \"${{ steps.bumped.outputs.new_version }}\"/" "app/build.gradle.kts"
          VC=$(grep -oP 'versionCode\s*=\s*\K\d+' "app/build.gradle.kts")
          sed -i "s/versionCode = .*/versionCode = $((VC+1))/" "app/build.gradle.kts"

      - name: Commit & tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "app/build.gradle.kts"
          git commit -m "chore: bump version to ${{ steps.bumped.outputs.new_version }}"
          git tag -a "v${{ steps.bumped.outputs.new_version }}" -m "v${{ steps.bumped.outputs.new_version }}"
          git push origin "v${{ steps.bumped.outputs.new_version }}"

  build:
    needs: version
    if: always() && (github.event_name != 'workflow_dispatch' || (needs.version.result == 'success' && github.event.inputs.create_release == 'true'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_B64 }}" ]; then
            echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > "${{ github.workspace }}/nova-scanner-key.jks"
            echo "Keystore decoded from secret"
          else
            keytool -genkeypair -v \
              -keystore "${{ github.workspace }}/nova-scanner-key.jks" \
              -alias nova-scanner -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -keypass "${{ secrets.KEY_PASSWORD }}" \
              -dname "CN=NovaScanner, OU=Dev, O=NovaProxy, L=World, S=World, C=US"
            echo "Temporary keystore generated"
          fi

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build APKs + AAB
        run: ./gradlew assembleRelease bundleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/nova-scanner-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG..HEAD" -- ':!.github')
          else
            NOTES=$(git log --pretty=format:"- %s (%h)" -30 -- ':!.github')
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          tag_name: ${{ github.ref_name }}
          name: Nova Radar ${{ github.ref_name }}
          body: |
            ## 📡 Nova Radar ${{ github.ref_name }}

            ### Download
            | Format | File |
            |---|---|
            | APK (Universal) | NovaRadar-v${{ github.ref_name }}-release.apk |
            | AAB (Play Store) | NovaRadar-v${{ github.ref_name }}-release.aab |

            ### Changes
            ${{ steps.notes.outputs.notes }}

            ### Build Info
            - **Version**: ${{ github.ref_name }}
            - **Min SDK**: 24 (Android 7.0)
            - **Target SDK**: 35
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream branch
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        run: |
          git push origin main:upstream-base --force 2>/dev/null || true
